name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore ScreenCaptureApp.slnx
      - name: Build
        run: dotnet build ScreenCaptureApp.slnx -c Release --no-restore
      - name: Test
        run: dotnet test ScreenCaptureApp.slnx -c Release --no-build
      - name: Publish self-contained application
        run: >-
          dotnet publish src/ScreenCaptureApp.App/ScreenCaptureApp.App.csproj
          -c Release -r win-x64 --self-contained true
          --no-build -o artifacts/app/win-x64
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ScreenCaptureApp-win-x64
          path: artifacts/app/win-x64
