name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore ScreenCaptureApp.slnx
      - name: Build
        run: dotnet build ScreenCaptureApp.slnx -c Release --no-restore
      - name: Test
        run: dotnet test ScreenCaptureApp.slnx -c Release --no-build
      - name: Publish self-contained application
        run: >-
          dotnet publish src/ScreenCaptureApp.App/ScreenCaptureApp.App.csproj
          -c Release -r win-x64 --self-contained true
          --no-build -o artifacts/app/win-x64
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ScreenCaptureApp-win-x64
          path: artifacts/app/win-x64
