name: Unsigned release build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  actions: read
  contents: read

jobs:
  build-unsigned-release:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 10.0.302

      - name: Install pinned Inno Setup compiler
        shell: pwsh
        run: >-
          choco install innosetup
          --version=6.7.1
          --yes
          --no-progress
          --source=https://community.chocolatey.org/api/v2/

      - name: Build and test unsigned release
        shell: pwsh
        run: >-
          .\eng\build-release.ps1
          -BuildInstaller
          -BuildEnterpriseMsi
          -BuildBrowserExtension

      - name: Create signing input
        shell: pwsh
        run: |
          $signingInput = "artifacts/signing-input"
          New-Item -ItemType Directory -Force `
            "$signingInput/installer", `
            "$signingInput/enterprise", `
            "$signingInput/extension" | Out-Null
          Copy-Item "artifacts/installer/SnipArc-Setup-x64.exe" "$signingInput/installer/"
          Copy-Item "artifacts/enterprise/SnipArc-Enterprise-x64.msi" "$signingInput/enterprise/"
          Copy-Item "artifacts/extension/SnipArc-Browser-Capture-0.2.0.zip" "$signingInput/extension/"
          Copy-Item "artifacts/SHA256SUMS.txt" "$signingInput/"
          Compress-Archive `
            -Path "$signingInput/*" `
            -DestinationPath "artifacts/SnipArc-unsigned-release.zip" `
            -CompressionLevel Optimal

      - name: Upload unsigned signing input
        id: upload-unsigned-release
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          path: artifacts/SnipArc-unsigned-release.zip
          archive: false
          if-no-files-found: error
          retention-days: 30

