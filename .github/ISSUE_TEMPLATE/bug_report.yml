name: Bug report
description: Report reproducible incorrect behavior in SnipArc
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Do not include confidential screenshots or security vulnerabilities. Use the Security tab for private vulnerability reports.
  - type: input
    id: version
    attributes:
      label: SnipArc version
      placeholder: 0.2.0-alpha
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: Windows 11 24H2
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Use generated or redacted sample data.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed personal, confidential, and legally protected information.
          required: true
